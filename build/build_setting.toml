
# タイトル (先頭に表示)
title = "ICPC Notebook"

# チーム名 + 大学名 (各ページ左上に表示)
teamname = "yawn at the top (The University of Osaka)"

# フォントサイズ
fontsize = "7.4pt"

# portrait (縦長) / landscape (横長)
orientation = "portrait"

# 何段組みか
num_columns = 2

# toc の後に : page (改ページする) / column (改段する) / auto (強制しない)
# break_after_toc = "column"
break_after_toc = "auto"

# ソースコードディレクトリ
src_folder = "src"

# PDF に出力する短いドキュメントのディレクトリ
src_doc_folder = "src-doc"


## PDF に出力する内容の選択
enable_extra = false                            # extra を PDF に出力する
enable_line_hash = true                         # C++ ソースの各行にハッシュを表示
do_delete_clang_format_instruction = true       # C++ ソースから "// clang-format" で始まる行を削除
do_delete_triple_slash_comment = true           # C++ ソースから "/// " で始まる行を削除



# [[sections]]
# name = "カテゴリ名"     # src/<カテゴリ名>/ファイル
# mode = "auto" | "manual"
# exclude = ["ファイル名", ... ]
#
# [[sections.include]]
# name = "ファイル名"
# display_name = "PDF にファイル名の代わりに表示するテキスト"
#            # default : display_name = name
#
# exclude に含まれたファイルは PDF に出力されない。
# それ以外で、 [[sections.include]] で指定されたファイルはその名前で PDF に出力される。
# それ以外のファイルは、 mode = "auto" ならばすべて PDF に出力される。
#
#   Example
#
#    [[sections]]
#    name = "structure"
#    mode = "auto"
#    exclude = [ "lazysegtree.hpp" ]
#    [[sections.include]]
#        name = "lazysegtree_2.hpp"
#        display_name = "lazysegtree.hpp"
#
#    -> structure/lazysegtree.hpp は出力されない。代わりに
#       structure/lazysegtree_2.hpp が "lazysegtree.hpp" という名前で出力される。

[[sections]]
name = "common"
mode = "auto"
exclude = [
    "hash.sh",
    "random.sh"
]

[[sections]]
name = "structure"
mode = "auto"
exclude = [
    "fenwick2D.hpp",
    "persistent-avl.hpp",
    "wavelet_matrix_full_feature.hpp"
]
[[sections.include]]
    name = "persistent_avl_acl_format.hpp"
    display_name = "persistent_avl.hpp"

